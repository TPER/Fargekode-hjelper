<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fargekode hjelper</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

body.popup-open{
  overflow:hidden;
}

h2{
  text-align:center;
  margin:10px 0;
}

.container{
  display:flex;
  gap:6px;
  padding:6px;
}

.col{
  flex:1;
  background:#1e1e1e;
  border-radius:10px;
  overflow:hidden;
}

.title{
  text-align:center;
  padding:10px;
  background:#333;
  font-weight:bold;
}

.modeButtons{
  display:flex;
  flex-wrap:wrap;
}

.modeBtn{
  flex:1;
  padding:12px;
  background:#2a2a2a;
  color:white;
  border:none;
  font-weight:bold;
}

.modeBtn.active{
  background:#4f8cff;
}

.tubeButtons{
  display:flex;
  flex-wrap:wrap;
}

.tubeBtn{
  flex:1;
  padding:10px;
  background:#1a1a1a;
  color:white;
  border:none;
}

.tubeBtn.active{
  background:#666;
}

.tubeSelect{
  display:none;
}

.mirrorBtn{
  width:100%;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  font-weight:bold;
}

.mirrorBtn.active{
  background:#4f8cff;
}

.fiber{
  padding:14px;
  text-align:center;
  font-weight:bold;
}

/* COLORS */
.blue{background:#1f4aff}
.orange{background:#ff8c00}
.green{background:#1ea500}
.brown{background:#6b3e26}
.gray{background:#888}
.white{background:#f0f0f0;color:black}
.red{background:#e60000}
.black{background:#111}
.yellow{background:#ffd700;color:black}
.violet{background:#7a00cc}
.pink{background:#ff4dc4;color:black}
.aqua{background:#00d4e0;color:black;}

/* POPUP */
.popup{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:60%;
  border-radius:16px;
  overflow:hidden;
  z-index:9999;
}

.popupItem{
  padding:10px;
  font-size:14px;
  text-align:center;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:700px){

  .modeBtn{
    flex:33.33%;
  }

  .tubeButtons{
    display:none;
  }

  .tubeSelect{
    display:block;
    width:100%;
    padding:14px;
    background:#2a2a2a;
    color:white;
  }
}
</style>
</head>

<body>

<h2>Fiber Optic Color Code</h2>

<button id="mirrorBtn" class="mirrorBtn">Speil A ↔ B: AV</button>

<div class="container">

<div class="col">

<div class="title" contenteditable="true">
ENDE A
</div>

<div id="leftModes" class="modeButtons"></div>

<select id="leftTubeSelect" class="tubeSelect"></select>

<div id="leftTubes" class="tubeButtons"></div>

<div id="left"></div>

</div>

<div class="col">

<div class="title" contenteditable="true">
ENDE B
</div>

<div id="rightModes" class="modeButtons"></div>

<select id="rightTubeSelect" class="tubeSelect"></select>

<div id="rightTubes" class="tubeButtons"></div>

<div id="right"></div>

</div>

</div>

<script>

/* 🔥 MODES */
const modes = [
  "TIA",
  "Telenor",
  "Hvit",
  "Rød",
  "Svart",
  "CUSTOM"
];

/* 🔥 COLORS */
const colors = [
  "blue",
  "orange",
  "green",
  "brown",
  "gray",
  "white",
  "red",
  "black",
  "yellow",
  "violet",
  "pink",
  "aqua"
];

const names = {
blue:"Blå",
orange:"Oransje",
green:"Grønn",
brown:"Brun",
gray:"Grå",
white:"Hvit",
red:"Rød",
black:"Sort",
yellow:"Gul",
violet:"Fiolett",
pink:"Rosa",
aqua:"Turkis"
};

/* 🔥 FIBER PROFILER */
const baseModes = {

TIA:[
"blue",
"orange",
"green",
"brown",
"gray",
"white",
"red",
"black",
"yellow",
"violet",
"pink",
"aqua"
],

"Telenor":[
"white",
"red",
"yellow",
"green",
"blue",
"gray",
"brown",
"black",
"violet",
"aqua",
"orange",
"pink"
],

"Hvit":[
"white",
"red",
"yellow",
"green",
"blue",
"gray",
"brown",
"black",
"violet",
"orange",
"pink",
"aqua"
],

"Rød":[
"red",
"blue",
"white",
"green",
"yellow",
"gray",
"orange",
"brown",
"violet",
"black",
"pink",
"aqua"
],

"Svart":[
"black",
"brown",
"red",
"orange",
"yellow",
"green",
"blue",
"violet",
"gray",
"white",
"pink",
"aqua"
]

};

/* 🔥 STATE */
let state = {
  leftMode:"TIA",
  rightMode:"TIA",
  leftTube:1,
  rightTube:1,
  mirror:false
};

let customLeft = [...baseModes.TIA];
let customRight = [...baseModes.TIA];

/* 🔥 MIRROR */
const mirrorBtn = document.getElementById("mirrorBtn");

mirrorBtn.onclick = ()=>{

  state.mirror = !state.mirror;

  mirrorBtn.innerText =
    "Speil A ↔ B: " + (state.mirror ? "PÅ" : "AV");

  mirrorBtn.classList.toggle("active");
};

/* 🔥 BUILD MODES */
function buildModes(id,side){

  const el=document.getElementById(id);

  el.innerHTML="";

  modes.forEach(m=>{

    let b=document.createElement("button");

    b.className="modeBtn";

    b.innerText=m;

    if(state[side+"Mode"]===m){
      b.classList.add("active");
    }

    b.onclick=()=>{
      state[side+"Mode"]=m;
      render();
    };

    el.appendChild(b);

  });

}

/* 🔥 BUILD TUBES */
function buildTubes(btnId,selectId,side){

  const btnWrap=document.getElementById(btnId);

  const select=document.getElementById(selectId);

  btnWrap.innerHTML="";
  select.innerHTML="";

  for(let i=1;i<=12;i++){

    let b=document.createElement("button");

    b.className="tubeBtn";

    b.innerText="R"+i;

    if(state[side+"Tube"]===i){
      b.classList.add("active");
    }

    b.onclick=()=>{
      state[side+"Tube"]=i;
      render();
    };

    btnWrap.appendChild(b);

    let o=document.createElement("option");

    o.value=i;

    o.innerText="Rør "+i;

    if(i===state[side+"Tube"]){
      o.selected=true;
    }

    select.appendChild(o);

  }

  select.onchange=(e)=>{
    state[side+"Tube"]=parseInt(e.target.value);
    render();
  };

}

/* 🔥 POPUP */
function closePopup(){

  document
    .querySelectorAll(".popup")
    .forEach(p=>p.remove());

  document.body.classList.remove("popup-open");

}

function openPopup(i,side){

  closePopup();

  let p=document.createElement("div");

  p.className="popup";

  p.onclick=(e)=>e.stopPropagation();

  colors.forEach(c=>{

    let d=document.createElement("div");

    d.className="popupItem "+c;

    let nr=((state[side+"Tube"]-1)*12)+(i+1);

    d.innerText=nr+" "+names[c];

    d.onclick=()=>{

      if(side==="left"){

        customLeft[i]=c;

        if(state.mirror){
          customRight[i]=c;
        }

      }else{

        customRight[i]=c;

        if(state.mirror){
          customLeft[i]=c;
        }

      }

      closePopup();

      render();

      /* 🔥 AUTO NEXT */
      if(i<11){
        setTimeout(()=>{
          openPopup(i+1,side);
        },100);
      }

    };

    p.appendChild(d);

  });

  document.body.appendChild(p);

  document.body.classList.add("popup-open");

  setTimeout(()=>{
    document.addEventListener("click",outsideClick,true);
  },50);

  function outsideClick(e){

    if(!p.contains(e.target)){

      closePopup();

      document.removeEventListener(
        "click",
        outsideClick,
        true
      );

    }

  }

}

/* 🔥 RENDER */
function renderSide(id,mode,custom,side){

  const el=document.getElementById(id);

  el.innerHTML="";

  const data =
    mode==="CUSTOM"
    ? custom
    : baseModes[mode];

  data.forEach((c,i)=>{

    let d=document.createElement("div");

    d.className="fiber "+c;

    let nr=((state[side+"Tube"]-1)*12)+(i+1);

    d.innerText=nr+" "+names[c];

    if(mode==="CUSTOM"){
      d.onclick=()=>openPopup(i,side);
    }

    el.appendChild(d);

  });

}

function render(){

  buildModes("leftModes","left");

  buildModes("rightModes","right");

  buildTubes(
    "leftTubes",
    "leftTubeSelect",
    "left"
  );

  buildTubes(
    "rightTubes",
    "rightTubeSelect",
    "right"
  );

  renderSide(
    "left",
    state.leftMode,
    customLeft,
    "left"
  );

  renderSide(
    "right",
    state.rightMode,
    customRight,
    "right"
  );

}

render();

</script>

</body>
</html>
